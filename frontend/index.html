<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Growth Copilot · 营销线索运营数字员工</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header>
    <h1>AI Growth Copilot</h1>
    <p class="subtitle">营销线索运营数字员工 · Demo</p>
    <div class="header-actions">
      <button id="open-playbooks-btn" class="header-btn" type="button">📚 方法论</button>
      <button id="open-analytics-btn" class="header-btn" type="button">📊 反馈统计</button>
    </div>
    <div id="health-pill" class="pill pill-loading">检查后端…</div>
  </header>

  <main>
    <section class="input-pane">
      <h2>① 输入线索</h2>

      <label for="lead-select">选择示例线索：</label>
      <select id="lead-select">
        <option value="">— 加载中… —</option>
      </select>

      <label for="lead-text">或粘贴线索文本：</label>
      <textarea id="lead-text" rows="10" placeholder="例如：&#10;来源：官网表单&#10;公司：某母婴电商&#10;客户留言：618 在即，客服 hold 不住..."></textarea>

      <button id="analyze-btn">开始分析</button>
      <span id="analyze-status"></span>
      <span class="id-tag" id="id-tag-wrap" hidden>
        客户 ID: <code id="id-tag-external"></code>
        · 分析 ID: <code id="id-tag-analysis"></code>
      </span>
    </section>

    <section class="result-pane" hidden>
      <h2>② 分析结果</h2>
      <div id="result"></div>
    </section>

    <section class="feedback-pane" hidden>
      <h2>④ 销售反馈（关联本次 analysis_id）</h2>
      <p class="hint">销售看到 AI 判断后，请补充真实结果，便于沉淀混淆矩阵。</p>
      <label for="feedback-outcome">实际结果：</label>
      <select id="feedback-outcome">
        <option value="deal">deal · 成交</option>
        <option value="no_deal">no_deal · 明确无意向</option>
        <option value="pending" selected>pending · 跟进中</option>
        <option value="lost">lost · 流失</option>
      </select>
      <label for="feedback-amount">成交金额（可选，仅 deal 有意义）：</label>
      <input id="feedback-amount" type="number" min="0" step="0.01" placeholder="0.00" />
      <label for="feedback-note">备注：</label>
      <textarea id="feedback-note" rows="3" placeholder="例如：客户技术决策人换了，方向变更..."></textarea>
      <button id="feedback-submit-btn" type="button">提交反馈</button>
      <span id="feedback-status"></span>
    </section>

    <section class="trace-pane" hidden>
      <h2>③ 执行过程 Trace</h2>
      <p class="trace-help">每一步显示决策摘要；点击展开看完整 JSON（含 prompt 版本、Tool I/O、耗时）。</p>
      <ol id="trace-timeline"></ol>
    </section>
  </main>

  <!-- 浮层：方法论编辑 -->
  <div id="playbook-modal" class="modal" hidden>
    <div class="modal-bg" data-close-modal="playbook"></div>
    <div class="modal-panel">
      <div class="modal-header">
        <h3>📚 销售自定义方法论 Playbook</h3>
        <button class="modal-close" type="button" data-close-modal="playbook">×</button>
      </div>
      <div class="modal-body two-col">
        <div class="pb-list-col">
          <div class="pb-toolbar">
            <button id="pb-new-btn" type="button">+ 新建</button>
            <button id="pb-reload-btn" type="button">↻ 刷新</button>
          </div>
          <ul id="pb-list" class="pb-list"></ul>
        </div>
        <div class="pb-editor-col">
          <label>文件名（不含 .md，限 a-z A-Z 0-9 _ -）</label>
          <input id="pb-name" type="text" placeholder="my_playbook" />
          <label>标题</label>
          <input id="pb-title" type="text" placeholder="例如：电商行业判断套路" />
          <label>方法论正文 (Markdown)</label>
          <textarea id="pb-body" rows="14" placeholder="例如：客户提到客服响应慢..."></textarea>
          <div class="pb-actions">
            <button id="pb-save-btn" type="button">💾 保存</button>
            <button id="pb-delete-btn" type="button" class="btn-danger">🗑 删除</button>
            <span id="pb-status"></span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 浮层：反馈统计 -->
  <div id="analytics-modal" class="modal" hidden>
    <div class="modal-bg" data-close-modal="analytics"></div>
    <div class="modal-panel">
      <div class="modal-header">
        <h3>📊 反馈统计</h3>
        <button class="modal-close" type="button" data-close-modal="analytics">×</button>
      </div>
      <div class="modal-body">
        <div id="analytics-body">加载中…</div>
      </div>
    </div>
  </div>

  <footer>
    <span>Skill <code id="skill-version">…</code></span>
    <span> · </span>
    <span>ReAct max_turns <code id="max-turns">…</code></span>
  </footer>

  <script src="/app.js"></script>
</body>
</html>
